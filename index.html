<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Content Queue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="ภาพรวมคิวโพสต์">
        <div>
          <p class="eyebrow">Facebook Multi Page Content Queue</p>
          <h1>บันทึกคอนเทนต์ลงชีต</h1>
        </div>
        <div class="summary-grid" aria-live="polite">
          <div class="summary-item"><span>รายการทั้งหมด</span><strong id="totalRows">-</strong></div>
          <div class="summary-item"><span>เลขถัดไป</span><strong id="nextIds">-</strong></div>
          <div class="summary-item"><span>เวลา</span><strong>Asia/Bangkok</strong></div>
        </div>
      </section>

      <section class="workarea">
        <form id="queueForm" class="entry-panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">New content</p>
              <h2>เพิ่มรายการโพสต์</h2>
            </div>
            <div class="panel-tools">
              <button type="button" class="icon-button" id="addContentBlock" aria-label="เพิ่ม New content">+</button>
              <span class="status-pill" id="apiState">ยังไม่เชื่อมต่อ</span>
            </div>
          </div>

          <div id="contentBlocks" class="content-blocks"></div>

          <section class="page-picker" aria-labelledby="pagePickerTitle">
            <div class="picker-head">
              <div><span class="field-title" id="pagePickerTitle">Page name</span></div>
              <button class="ghost-button" type="button" id="toggleAllPages">เลือกทั้งหมด</button>
            </div>
            <div class="page-list" id="pageList"></div>
          </section>

          <div class="locked-fields">
            <div><span>Timezone</span><strong>Asia/Bangkok</strong></div>
            <div><span>Status</span><strong>READY</strong></div>
          </div>

          <div class="form-actions">
            <button type="button" class="secondary-button" id="refreshButton">รีเฟรชรายการ</button>
            <button type="submit" class="primary-button" id="submitButton">บันทึกลงชีต</button>
          </div>
          <p class="form-message" id="formMessage" role="status"></p>
        </form>

        <section class="table-panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Saved queue</p>
              <h2>รายการที่บันทึกแล้ว</h2>
            </div>
            <button type="button" class="icon-button" id="reloadTable" aria-label="โหลดรายการใหม่">↻</button>
          </div>

          <div class="queue-list" id="queueList"><div class="empty-state">กำลังโหลดข้อมูล...</div></div>

          <div class="pagination-bar" aria-label="แบ่งหน้ารายการที่บันทึกแล้ว">
            <span id="pageRange">0 / 0</span>
            <div class="pagination-controls">
              <button type="button" class="table-action" id="prevPage">ก่อนหน้า</button>
              <strong id="pageIndicator">หน้า 0 / 0</strong>
              <button type="button" class="table-action" id="nextPage">ถัดไป</button>
            </div>
          </div>
        </section>
      </section>
    </main>

    <div class="lightbox" id="mediaLightbox" aria-hidden="true">
      <div class="lightbox-panel" role="dialog" aria-modal="true" aria-label="ดูสื่อ">
        <button type="button" class="icon-button lightbox-close" id="closeLightbox" aria-label="ปิด">×</button>
        <div class="lightbox-media" id="lightboxMedia"></div>
      </div>
    </div>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
